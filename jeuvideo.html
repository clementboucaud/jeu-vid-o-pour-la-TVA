<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Accueil</title>
</head>
<body>
    <header>
        <span>Gestionnaire de tournoi de jeu vidéo TVA</span>
        <button id="musicBtn" onclick="toggleMusic()" class="music-button">audio on/audio off</button>
    </header>
    <p><a href="joueur.html"><button>Joueur</button></a></p>
    <p><a href="resultatmatch.html"><button>Résultat du match</button></a></p>
    <p><a href="match.html"><button>Match</button></a></p>
    <audio id="music" loop volume="0.5">
        <source src="mssbu.mp3" type="audio/mpeg">
    </audio>
    <script>
        let isPlaying = localStorage.getItem('musicPlaying') === 'true';
        function toggleMusic() {
            const audio = document.getElementById('music');
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                localStorage.setItem('musicPlaying', 'false');
            } else {
                audio.play();
                isPlaying = true;
                localStorage.setItem('musicPlaying', 'true');
            }
        }
        window.addEventListener('load', function() {
            if (isPlaying) {
                document.getElementById('music').play();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat du match</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <span>Résultat du match</span>
        <button id="musicBtn" onclick="toggleMusic()" class="music-button">🔊</button>
    </header>
    <p>Voici les résultats du match :</p>
    <table border="1">
        <tr>
            <th>Gagnant</th>
            <th>Perdant</th>
            <th>Score</th>
        </tr>
        <tr>
            <td></td>
            <td></td>
            <td></td>
        </tr>
        <tr>
            <td></td>
            <td></td>  
            <td></td>
        </tr>
    </table>
    <br><br><br><br>
    <h2><a href="jeuvideo.html"><button>Retour à l'accueil</button></a></h2>
    <audio id="music" loop volume="0.5">
        <source src="mssbu.mp3" type="audio/mpeg">
    </audio>
    <script>
        let isPlaying = localStorage.getItem('musicPlaying') === 'true';
        function updateMusicButton() {
            const btn = document.getElementById('musicBtn');
            btn.textContent = isPlaying ? '🔊' : '🔇';
        }
        function toggleMusic() {
            const audio = document.getElementById('music');
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                localStorage.setItem('musicPlaying', 'false');
            } else {
                audio.play();
                isPlaying = true;
                localStorage.setItem('musicPlaying', 'true');
            }
            updateMusicButton();
        }
        window.addEventListener('load', function() {
            updateMusicButton();
            if (isPlaying) {
                document.getElementById('music').play();
            }
        });
    </script>
</body>
</html>

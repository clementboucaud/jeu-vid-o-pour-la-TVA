<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Match</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="page-match">
    <header>
        <span>Match</span>
        <button id="musicBtn" onclick="toggleMusic()" class="music-button">🔊</button>
    </header>
    <p>Voici les informations sur le match:</p>
    <button>Créer un match</button>
    <br><br><br><br><br><br><br>
    <h2><a href="jeuvideo.html"><button>Retour à l'accueil</button></a></h2>
    <audio id="music" loop volume="0.5">
        <source src="mssbu.mp3" type="audio/mpeg">
    </audio>
    <script>
        let isPlaying = localStorage.getItem('musicPlaying') === 'true';
        function updateMusicButton() {
            const btn = document.getElementById('musicBtn');
            btn.textContent = isPlaying ? '🔊' : '🔇';
        }
        function toggleMusic() {
            const audio = document.getElementById('music');
            if (isPlaying) {
                audio.pause();
                isPlaying = false;
                localStorage.setItem('musicPlaying', 'false');
            } else {
                audio.play();
                isPlaying = true;
                localStorage.setItem('musicPlaying', 'true');
            }
            updateMusicButton();
        }
        window.addEventListener('load', function() {
            updateMusicButton();
            if (isPlaying) {
                document.getElementById('music').play();
            }
        });
    </script>
</body>
</html>
